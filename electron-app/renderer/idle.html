<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #202124;
      color: #e0e0e0;
      font-family: 'Google Sans', 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
      opacity: 0.7;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
    }
    .logo svg {
      width: 100%;
      height: 100%;
    }
    h1 {
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 8px;
      color: #ffffff;
    }
    p {
      font-size: 13px;
      color: #9e9e9e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
        <circle cx="8" cy="8" r="7.5" fill="#D97757"/>
        <rect x="17" y="2" width="13" height="13" fill="#7765E3"/>
        <rect x="2" y="17" width="13" height="13" fill="#E8547A"/>
        <circle cx="24" cy="24" r="7.5" fill="#3ECFCF"/>
      </svg>
    </div>
    <h1>Vibeconferencing</h1>
    <p>Join a Google Meet call to get started</p>
  </div>
</body>
</html>
