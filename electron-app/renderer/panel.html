<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <div class="container">
    <h1>Vibeconferencing Agent</h1>
    <div class="error-bar" id="errorBar" style="display:none"></div>

    <div class="field">
      <label for="meetUrl">Meet URL</label>
      <input type="text" id="meetUrl" value="https://meet.google.com/paz-sqoa-npe" />
    </div>
    <button id="joinBtn" class="primary">Join Meet</button>

    <div class="section" id="connectedSection" style="display:none">
      <div class="field">
        <label>Room ID</label>
        <input type="text" id="meetCode" readonly />
      </div>
      <a id="roomLink" href="#" class="room-link" style="display:none">Open room on vibeconferencing.com</a>
      <button id="copyPromptBtn">Copy Agent Prompt</button>
    </div>

    <div class="section">
      <h2>Transcript</h2>
      <div id="transcriptArea" class="transcript-area"></div>
    </div>

    <div class="section">
      <details>
        <summary class="debug-toggle">Troubleshooting</summary>
        <div id="micPermissionWarning" class="error-bar" style="display:none;margin-bottom:8px">Microphone permission problem detected</div>
        <div class="field">
          <label>Live Caption Text</label>
          <div id="rawCaptionText" class="audio-status" style="max-height:100px;overflow-y:auto;font-family:monospace;font-size:11px;white-space:pre-wrap"></div>
        </div>
        <h2 style="margin-top:12px">Test TTS</h2>
        <div class="field">
          <input type="text" id="speakText" value="Hello from TTS" />
        </div>
        <button id="speakTextBtn">Speak using TTS</button>
        <button id="speechBtn">Play Test Audio File</button>
        <h2 style="margin-top:12px">Test Curl</h2>
        <div class="field">
          <div id="curlCommand" class="audio-status" style="font-family:monospace;font-size:10px;white-space:pre-wrap;word-break:break-all"></div>
        </div>
        <button id="copyCurlBtn" disabled>Copy Curl Command</button>
      </details>
    </div>

    <div class="section">
      <details>
        <summary class="debug-toggle">Settings</summary>
        <div class="field">
          <label for="botName">Bot Name</label>
          <input type="text" id="botName" value="AI Assistant" />
        </div>
        <div class="field">
          <label for="syncBaseUrl">Server URL</label>
          <input type="text" id="syncBaseUrl" placeholder="https://vibeconferencing.com" />
          <div style="font-size:11px;color:#666;margin-top:2px">Leave blank for production.</div>
        </div>
        <div class="field">
          <label for="ttsApiKey">ElevenLabs API Key</label>
          <input type="password" id="ttsApiKey" placeholder="sk_..." />
        </div>
        <div class="field">
          <label for="ttsVoiceId">ElevenLabs Voice ID</label>
          <input type="text" id="ttsVoiceId" placeholder="CwhRBWXzGAHq8TQ4Fs17" />
        </div>
      </details>
    </div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
