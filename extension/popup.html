<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h1>Vibeconferencing Agent</h1>
      <a href="#" id="settingsLink" title="Settings" style="color:#8ab4f8;font-size:20px;text-decoration:none">&#9881;</a>
    </div>
    <div class="error-bar" id="errorBar" style="display:none"></div>
    <div class="status" id="status" style="display:none">Open a Google Meet link to get started</div>

    <a id="roomLink" href="#" target="_blank" class="room-link" style="display:none">Open room on vibeconferencing.com</a>
    <button id="copyPromptBtn" disabled>Copy Agent Prompt</button>
    <button id="presentBtn" disabled>Start Presenting Whiteboard</button>

    <div class="section">
      <h2>Transcript</h2>
      <div id="transcriptArea" class="transcript-area"></div>
    </div>

    <div class="section">
      <details>
        <summary class="debug-toggle">Troubleshooting</summary>
        <div class="field">
          <label>Live Caption Text</label>
          <div id="rawCaptionText" class="audio-status" style="max-height:100px;overflow-y:auto;font-family:monospace;font-size:11px;white-space:pre-wrap"></div>
        </div>
        <div id="syncStatus" class="audio-status">Not connected</div>
        <div class="field">
          <label>Room ID (Meet code)</label>
          <input type="text" id="meetCode" readonly />
        </div>
        <div class="field">
          <label>API Endpoint</label>
          <input type="text" id="apiEndpoint" readonly />
        </div>
        <div id="audioStatus" class="audio-status">No participants detected</div>
        <div id="audioParticipants"></div>
      </details>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
