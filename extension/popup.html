<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <h1>Vibeconferencing Agent</h1>
    <div class="status" id="status">Looking for Meet tab…</div>
    <div class="error-bar" id="errorBar" style="display:none"></div>

    <div class="section">
      <h2>Agent Connection</h2>
      <div id="syncStatus" class="audio-status">Not connected</div>
      <div class="field">
        <label>Room ID (Meet code)</label>
        <input type="text" id="meetCode" readonly />
      </div>
      <div class="field">
        <label>API Endpoint</label>
        <input type="text" id="apiEndpoint" readonly />
      </div>
      <a id="roomLink" href="#" target="_blank" class="room-link">Open room on vibeconferencing.com</a>
      <button id="copyPromptBtn" disabled>Copy Agent Prompt</button>
    </div>

    <button id="presentBtn" disabled>Start Presenting Whiteboard</button>

    <div class="section">
      <h2>Transcript</h2>
      <div id="transcriptArea" class="transcript-area"></div>
    </div>

    <div class="section">
      <details>
        <summary class="debug-toggle">Troubleshooting</summary>
        <div id="audioStatus" class="audio-status">No participants detected</div>
        <div id="audioParticipants"></div>
      </details>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
