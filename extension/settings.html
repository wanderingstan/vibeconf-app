<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h1>Settings</h1>
      <a href="popup.html" style="color:#8ab4f8;font-size:13px;text-decoration:none">&larr; Back</a>
    </div>

    <div class="field">
      <label for="botName">Bot Name</label>
      <input type="text" id="botName" value="AI Assistant" />
    </div>

    <div class="section">
      <h2>ElevenLabs</h2>
      <div class="field">
        <label for="ttsApiKey">API Key</label>
        <input type="password" id="ttsApiKey" placeholder="sk_..." />
      </div>
      <div class="field">
        <label for="ttsVoiceId">Voice ID</label>
        <input type="text" id="ttsVoiceId" placeholder="CwhRBWXzGAHq8TQ4Fs17" />
      </div>
      <div class="field">
        <label for="speakText">Test TTS</label>
        <input type="text" id="speakText" placeholder="Hello everyone!" />
      </div>
      <button id="speakTextBtn" disabled>Speak</button>
      <button id="speechBtn" disabled>Play Sample Audio</button>
    </div>

  </div>
  <script src="settings.js"></script>
</body>
</html>
